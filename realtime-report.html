<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해트케 실시간 리포트</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3348;
  --text: #e2e8f0; --muted: #8892a4; --accent: #4f7fff;
  --red: #ef4444; --yellow: #f59e0b; --green: #22c55e; --purple: #a78bfa;
}
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; min-height: 100vh; }

.header { display: flex; align-items: center; gap: 12px; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); }
.logo { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; }
.header h1 { font-size: 15px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-time { margin-left: auto; font-size: 12px; color: var(--muted); }

.main { max-width: 1500px; margin: 0 auto; padding: 24px 28px; }
.section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

/* Input card */
.input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
.input-block { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
.input-block:last-child { margin-bottom: 0; }
.block-label { font-size: 12px; font-weight: 700; color: var(--text); min-width: 50px; align-self: flex-end; padding-bottom: 2px; }
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-group label { font-size: 11px; color: var(--muted); }
.input-group input[type=number],
.input-group input[type=text] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 8px 12px; border-radius: 8px; outline: none; width: 150px; }
.input-group input[type=text].wide { width: 340px; }
.input-group input[type=date] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 8px 12px; border-radius: 8px; outline: none; width: 160px; color-scheme: dark; }
.input-group input:focus { border-color: var(--accent); }

.time-btns { display: flex; gap: 8px; }
.time-btn { padding: 8px 18px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; }
.time-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.time-btn[data-t="0"].active { background: var(--purple); border-color: var(--purple); }

.vdiv { width: 1px; height: 44px; background: var(--border); align-self: flex-end; margin: 0 4px; }

/* Action row */
.action-row { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 24px; }
.btn { padding: 9px 20px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3d6ef0; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
.btn-danger:hover { background: rgba(239,68,68,0.22); }

/* Summary */
.summary-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.compare-btns { display: flex; gap: 6px; }
.compare-btn { padding: 4px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
.compare-btn.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }

.summary-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 24px; }
.s-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.s-lbl { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.s-val { font-size: 20px; font-weight: 700; }
.s-delta { font-size: 11px; margin-top: 5px; font-weight: 600; }
.s-delta.up { color: var(--green); }
.s-delta.down { color: var(--red); }
.s-delta.flat { color: var(--muted); }

/* Graph */
.graph-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
.graph-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.graph-title { font-size: 13px; font-weight: 600; }
.metric-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.metric-tab { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
.metric-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Tabs */
.page-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
.page-tab { padding: 10px 18px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.18s; }
.page-tab:hover { color: var(--text); }
.page-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Table */
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.table-title { font-size: 13px; font-weight: 600; }
.filter-row { display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--muted); }
.filter-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 5px 10px; border-radius: 6px; outline: none; color-scheme: dark; }
.filter-input:focus { border-color: var(--accent); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--surface2); color: var(--muted); font-weight: 600; padding: 10px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
th:first-child, th:nth-child(2), th.center { text-align: center; }
td { padding: 9px 12px; border-bottom: 1px solid rgba(46,51,72,0.4); text-align: right; white-space: nowrap; }
td:first-child, td:nth-child(2), td.center { text-align: center; }
td.memo-cell { text-align: left; max-width: 180px; overflow: hidden; text-overflow: ellipsis; color: var(--muted); font-size: 11px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

.badge-time { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.badge-12   { background: rgba(79,127,255,0.15); color: #6b9fff; }
.badge-16   { background: rgba(245,158,11,0.15); color: var(--yellow); }
.badge-final { background: rgba(34,197,94,0.15); color: var(--green); }

.del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; }
.del-btn:hover { color: var(--red); }

.time-filter-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
.time-filter-btn.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }
.dow-period-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
.dow-period-btn.active { background: var(--surface); border-color: var(--green); color: var(--green); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }

/* 요일별 평균 */
.dow-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 20px; }
.dow-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; text-align: center; }
.dow-name { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
.dow-roas { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.dow-sub { font-size: 10px; color: var(--muted); line-height: 1.6; }
.dow-count { font-size: 10px; color: var(--border); margin-top: 6px; }
.dow-chart-wrap { padding: 0 20px 20px; }

/* 매출 채널 그룹 */
.sales-groups { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.channel-group { border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; background: rgba(255,255,255,0.015); }
.group-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.channel-row { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
.channel-row:last-child { margin-bottom: 0; }
.channel-name { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 56px; align-self: flex-end; padding-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">H</div>
  <h1>해트케 <span>실시간 리포트</span></h1>
  <span class="header-time" id="header-time"></span>
</div>

<div class="main">

  <!-- 입력 -->
  <div class="section-label">데이터 입력</div>
  <div class="input-card">
    <div class="input-block">
      <div class="input-group">
        <label>날짜</label>
        <input type="date" id="inp-date">
      </div>
      <div class="input-group">
        <label>시간대</label>
        <div class="time-btns">
          <button class="time-btn active" data-t="12" onclick="selectTime(this)">12시</button>
          <button class="time-btn" data-t="16" onclick="selectTime(this)">16시</button>
          <button class="time-btn" data-t="0"  onclick="selectTime(this)">최종</button>
        </div>
      </div>
    </div>

    <!-- 매출 그룹 -->
    <div class="section-label" style="margin-bottom:10px">매출</div>
    <div class="sales-groups">

      <!-- 자사몰 -->
      <div class="channel-group">
        <div class="group-title" style="color:var(--accent)">자사몰</div>
        <div class="channel-row">
          <span class="channel-name">카페24</span>
          <div class="input-group">
            <label>매출</label>
            <input type="number" id="inp-cafe24-sales" placeholder="0">
          </div>
          <div class="input-group">
            <label>주문건수</label>
            <input type="number" id="inp-cafe24-orders" placeholder="0">
          </div>
          <div class="input-group">
            <label>환불</label>
            <input type="number" id="inp-cafe24-refund" placeholder="0">
          </div>
        </div>
      </div>

      <!-- 쿠팡 -->
      <div class="channel-group">
        <div class="group-title" style="color:#ff6b35">쿠팡</div>
        <div class="channel-row">
          <span class="channel-name">쿠팡 1</span>
          <div class="input-group">
            <label>매출</label>
            <input type="number" id="inp-coupang-sales" placeholder="0">
          </div>
          <div class="input-group">
            <label>주문건수</label>
            <input type="number" id="inp-coupang-orders" placeholder="0">
          </div>
          <div class="input-group">
            <label>환불</label>
            <input type="number" id="inp-coupang-refund" placeholder="0">
          </div>
        </div>
        <div class="channel-row">
          <span class="channel-name">쿠팡 2</span>
          <div class="input-group">
            <label>매출</label>
            <input type="number" id="inp-coupang2-sales" placeholder="0">
          </div>
          <div class="input-group">
            <label>주문건수</label>
            <input type="number" id="inp-coupang2-orders" placeholder="0">
          </div>
          <div class="input-group">
            <label>환불</label>
            <input type="number" id="inp-coupang2-refund" placeholder="0">
          </div>
        </div>
      </div>

    </div>

    <div class="input-block">
      <span class="block-label">광고비</span>
      <div class="input-group">
        <label>메타</label>
        <input type="number" id="inp-meta" placeholder="0">
      </div>
      <div class="input-group">
        <label>구글</label>
        <input type="number" id="inp-google" placeholder="0">
      </div>
      <div class="input-group">
        <label>틱톡</label>
        <input type="number" id="inp-tiktok" placeholder="0">
      </div>
    </div>

    <div class="input-block">
      <span class="block-label">메모</span>
      <div class="input-group">
        <label>메모 (선택)</label>
        <input type="text" id="inp-memo" class="wide" placeholder="예: 신소재 론칭, 메타 예산 증액 등">
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn btn-ghost" onclick="captureReport()">캡처</button>
    <button class="btn btn-ghost" onclick="copyToSheet()">스프레드시트 복사</button>
    <button class="btn btn-primary" onclick="saveRecord()">저장</button>
  </div>

  <!-- 요약 -->
  <div class="summary-header">
    <span class="section-label" style="margin-bottom:0">최근 저장 기준</span>
    <div class="compare-btns">
      <button class="compare-btn active" data-mode="yesterday" onclick="setCompareMode(this)">어제 비교</button>
      <button class="compare-btn" data-mode="lastweek" onclick="setCompareMode(this)">지난주 비교</button>
      <button class="compare-btn" data-mode="none" onclick="setCompareMode(this)">비교 없음</button>
    </div>
  </div>
  <div class="summary-grid">
    <div class="s-card"><div class="s-lbl">총 매출</div><div class="s-val" id="s-revenue">—</div><div class="s-delta flat" id="d-revenue"></div></div>
    <div class="s-card"><div class="s-lbl">총 광고비</div><div class="s-val" id="s-adspend">—</div><div class="s-delta flat" id="d-adspend"></div></div>
    <div class="s-card"><div class="s-lbl">ROAS</div><div class="s-val" id="s-roas">—</div><div class="s-delta flat" id="d-roas"></div></div>
    <div class="s-card"><div class="s-lbl">CPA</div><div class="s-val" id="s-cpa">—</div><div class="s-delta flat" id="d-cpa"></div></div>
    <div class="s-card"><div class="s-lbl">객단가</div><div class="s-val" id="s-aov">—</div><div class="s-delta flat" id="d-aov"></div></div>
    <div class="s-card"><div class="s-lbl">자사 비율</div><div class="s-val" id="s-selfrate">—</div><div class="s-delta flat" id="d-selfrate"></div></div>
  </div>

  <!-- 그래프 -->
  <div class="graph-card">
    <div class="graph-header">
      <span class="graph-title">트렌드 그래프</span>
      <div class="metric-tabs">
        <button class="metric-tab active" onclick="switchMetric('revenue', this)">매출</button>
        <button class="metric-tab" onclick="switchMetric('roas', this)">ROAS</button>
        <button class="metric-tab" onclick="switchMetric('adspend', this)">광고비</button>
        <button class="metric-tab" onclick="switchMetric('cpa', this)">CPA</button>
        <button class="metric-tab" onclick="switchMetric('aov', this)">객단가</button>
      </div>
    </div>
    <canvas id="trend-chart" height="75"></canvas>
  </div>

  <!-- 탭 -->
  <div class="table-card">
    <div class="page-tabs">
      <div class="page-tab active" onclick="switchTab('records', this)">리포트 기록</div>
      <div class="page-tab" onclick="switchTab('dow', this)">요일별 평균</div>
    </div>

    <!-- 리포트 기록 탭 -->
    <div class="tab-panel active" id="tab-records">
      <div class="table-header">
        <span class="table-title">전체 기록</span>
        <button class="btn btn-danger" onclick="clearAll()">전체 초기화</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">기간 필터</span>
        <input type="date" class="filter-input" id="filter-from" onchange="renderTable(); renderChart();">
        <span style="font-size:11px; color:var(--muted)">~</span>
        <input type="date" class="filter-input" id="filter-to" onchange="renderTable(); renderChart();">
        <button class="btn btn-ghost" style="padding:5px 14px; font-size:11px;" onclick="resetFilter()">초기화</button>
        <div style="margin-left:auto; display:flex; gap:6px;">
          <button class="time-filter-btn active" data-tf="all" onclick="setTableTimeFilter(this)">전체</button>
          <button class="time-filter-btn" data-tf="12" onclick="setTableTimeFilter(this)">12시</button>
          <button class="time-filter-btn" data-tf="16" onclick="setTableTimeFilter(this)">16시</button>
          <button class="time-filter-btn" data-tf="0" onclick="setTableTimeFilter(this)">최종</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="center">날짜</th>
              <th class="center">시간</th>
              <th>총 매출</th>
              <th>카페24</th>
              <th>쿠팡</th>
              <th>총 광고비</th>
              <th>메타</th>
              <th>구글</th>
              <th>틱톡</th>
              <th>주문건수</th>
              <th>ROAS</th>
              <th>CPA</th>
              <th>객단가</th>
              <th>자사율</th>
              <th>메모</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="records-tbody"></tbody>
        </table>
        <div class="empty-state" id="empty-state">저장된 리포트가 없습니다.</div>
      </div>
    </div>

    <!-- 요일별 평균 탭 -->
    <div class="tab-panel" id="tab-dow">
      <div class="table-header">
        <span class="table-title">요일별 평균 <span style="font-size:10px; color:var(--muted); font-weight:400">(최종 기준)</span></span>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div style="display:flex; gap:4px;">
            <button class="dow-period-btn active" data-period="all" onclick="setDowPeriod(this)">전체</button>
            <button class="dow-period-btn" data-period="1w" onclick="setDowPeriod(this)">1주</button>
            <button class="dow-period-btn" data-period="2w" onclick="setDowPeriod(this)">2주</button>
            <button class="dow-period-btn" data-period="3w" onclick="setDowPeriod(this)">3주</button>
            <button class="dow-period-btn" data-period="1m" onclick="setDowPeriod(this)">한달</button>
          </div>
          <div class="metric-tabs" id="dow-metric-tabs">
            <button class="metric-tab active" onclick="switchDowMetric('roas', this)">ROAS</button>
            <button class="metric-tab" onclick="switchDowMetric('revenue', this)">매출</button>
            <button class="metric-tab" onclick="switchDowMetric('adspend', this)">광고비</button>
            <button class="metric-tab" onclick="switchDowMetric('cpa', this)">CPA</button>
            <button class="metric-tab" onclick="switchDowMetric('aov', this)">객단가</button>
          </div>
        </div>
      </div>
      <div class="dow-grid" id="dow-grid"></div>
      <div class="dow-chart-wrap">
        <canvas id="dow-chart" height="60"></canvas>
      </div>
      <div class="empty-state" id="dow-empty" style="display:none">데이터가 부족합니다.</div>
    </div>
  </div>

</div>

<script>
const STORE_KEY = 'hatke_realtime_v2';
let records = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
let currentMetric = 'revenue';
let dowMetric = 'roas';
let dowPeriod = 'all';
let tableTimeFilter = 'all';
let compareMode = 'yesterday';
let chart = null;
let dowChart = null;

// 시계
function updateClock() {
  const now = new Date();
  const p = n => String(n).padStart(2, '0');
  document.getElementById('header-time').textContent =
    `${now.getFullYear()}.${p(now.getMonth()+1)}.${p(now.getDate())}  ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}
updateClock();
setInterval(updateClock, 1000);

function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
document.getElementById('inp-date').value = today();

function selectTime(btn) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (btn.dataset.t === '0') {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    document.getElementById('inp-date').value =
      `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  } else {
    document.getElementById('inp-date').value = today();
  }
}

function getSelectedTime() {
  return document.querySelector('.time-btn.active')?.dataset.t || '12';
}

function setCompareMode(btn) {
  compareMode = btn.dataset.mode;
  document.querySelectorAll('.compare-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (records.length > 0) updateSummary(records[records.length - 1]);
}

function num(id) { return parseFloat(document.getElementById(id).value) || 0; }

function fmt(n) { return Math.round(n).toLocaleString(); }
function fmtWon(n) { return Math.round(n).toLocaleString() + '원'; }

function calcMetrics(r) {
  const cafe24Net   = (r.cafe24Sales || 0) - (r.cafe24Refund || 0);
  const coupang1Net = (r.coupangSales || 0) - (r.coupangRefund || 0);
  const coupang2Net = (r.coupang2Sales || 0) - (r.coupang2Refund || 0);
  const coupangNet  = coupang1Net + coupang2Net;
  const revenue = cafe24Net + coupangNet;
  const adspend = (r.meta || 0) + (r.google || 0) + (r.tiktok || 0);
  const orders  = (r.cafe24Orders || 0) + (r.coupangOrders || 0) + (r.coupang2Orders || 0);
  const roas     = adspend > 0 ? revenue / adspend * 100 : 0;
  const cpa      = orders  > 0 ? adspend / orders : 0;
  const aov      = orders  > 0 ? revenue / orders : 0;
  const selfRate = revenue > 0 ? cafe24Net / revenue * 100 : 0;
  return { revenue, adspend, orders, roas, cpa, aov, selfRate, cafe24Net, coupangNet, coupang1Net, coupang2Net };
}

function getComparisonRecord(date, time) {
  if (compareMode === 'none') return null;
  const d = new Date(date);
  d.setDate(d.getDate() - (compareMode === 'yesterday' ? 1 : 7));
  const cmpDate = d.toISOString().slice(0, 10);
  return records.find(r => r.date === cmpDate && r.time === time) || null;
}

function deltaHTML(cur, prev, unit, lowerIsBetter) {
  if (prev == null) return '';
  const diff = cur - prev;
  const up   = diff > 0;
  const good = lowerIsBetter ? !up : up;
  if (unit === 'won') {
    const abs = Math.abs(Math.round(diff));
    const cls   = abs < 1 ? 'flat' : good ? 'up' : 'down';
    const arrow = abs < 1 ? '—' : up ? '▲' : '▼';
    return `<span class="${cls}">${arrow} ${abs.toLocaleString()}원</span>`;
  } else {
    const abs = Math.abs(diff);
    const cls   = abs < 0.05 ? 'flat' : good ? 'up' : 'down';
    const arrow = abs < 0.05 ? '—' : up ? '▲' : '▼';
    return `<span class="${cls}">${arrow} ${abs.toFixed(1)}%</span>`;
  }
}

function updateSummary(rec) {
  const m    = calcMetrics(rec);
  const cmpR = getComparisonRecord(rec.date, rec.time);
  const cmp  = cmpR ? calcMetrics(cmpR) : null;

  document.getElementById('s-revenue').textContent  = fmt(m.revenue) + '원';
  document.getElementById('s-adspend').textContent  = fmt(m.adspend) + '원';
  document.getElementById('s-roas').textContent     = m.roas.toFixed(0) + '%';
  document.getElementById('s-cpa').textContent      = fmt(m.cpa) + '원';
  document.getElementById('s-aov').textContent      = fmt(m.aov) + '원';
  document.getElementById('s-selfrate').textContent = m.selfRate.toFixed(1) + '%';

  const roasEl = document.getElementById('s-roas');
  roasEl.style.color = m.roas >= 300 ? 'var(--green)' : m.roas >= 150 ? 'var(--yellow)' : 'var(--red)';

  document.getElementById('d-revenue').innerHTML  = cmp ? deltaHTML(m.revenue,  cmp.revenue,  'won', false) : '';
  document.getElementById('d-adspend').innerHTML  = cmp ? deltaHTML(m.adspend,  cmp.adspend,  'won', true)  : '';
  document.getElementById('d-roas').innerHTML     = cmp ? deltaHTML(m.roas,     cmp.roas,     'pct', false) : '';
  document.getElementById('d-cpa').innerHTML      = cmp ? deltaHTML(m.cpa,      cmp.cpa,      'won', true)  : '';
  document.getElementById('d-aov').innerHTML      = cmp ? deltaHTML(m.aov,      cmp.aov,      'won', false) : '';
  document.getElementById('d-selfrate').innerHTML = cmp ? deltaHTML(m.selfRate, cmp.selfRate, 'pct', false) : '';
}

function saveRecord() {
  const date = document.getElementById('inp-date').value;
  const time = getSelectedTime();
  if (!date) { alert('날짜를 선택해주세요.'); return; }

  const rec = {
    id: Date.now(), date, time,
    cafe24Sales:   num('inp-cafe24-sales'),
    cafe24Orders:  num('inp-cafe24-orders'),
    cafe24Refund:  num('inp-cafe24-refund'),
    coupangSales:   num('inp-coupang-sales'),
    coupangOrders:  num('inp-coupang-orders'),
    coupangRefund:  num('inp-coupang-refund'),
    coupang2Sales:  num('inp-coupang2-sales'),
    coupang2Orders: num('inp-coupang2-orders'),
    coupang2Refund: num('inp-coupang2-refund'),
    meta:   num('inp-meta'),
    google: num('inp-google'),
    tiktok: num('inp-tiktok'),
    memo: document.getElementById('inp-memo').value.trim(),
  };

  const idx = records.findIndex(r => r.date === date && r.time === time);
  if (idx >= 0) {
    if (!confirm(`${date} ${time}시 기록이 이미 있습니다. 덮어쓸까요?`)) return;
    records[idx] = rec;
  } else {
    records.push(rec);
  }

  // 날짜 같을 때 12 → 16 → 최종(0) 순서
  const timeOrder = t => t === '12' ? 1 : t === '16' ? 2 : 3;
  records.sort((a, b) => {
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    return timeOrder(a.time) - timeOrder(b.time);
  });

  saveStorage();
  updateSummary(rec);
  clearInputs();
  renderTable();
  renderChart();
  renderDow();
}

function clearInputs() {
  ['inp-cafe24-sales','inp-cafe24-orders','inp-cafe24-refund',
   'inp-coupang-sales','inp-coupang-orders','inp-coupang-refund',
   'inp-coupang2-sales','inp-coupang2-orders','inp-coupang2-refund',
   'inp-meta','inp-google','inp-tiktok'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-memo').value = '';
}

function saveStorage() { localStorage.setItem(STORE_KEY, JSON.stringify(records)); }

function deleteRecord(id) {
  if (!confirm('이 기록을 삭제하시겠습니까?')) return;
  records = records.filter(r => r.id !== id);
  saveStorage(); renderTable(); renderChart(); renderDow();
}

function clearAll() {
  if (!confirm('모든 기록을 삭제하시겠습니까?')) return;
  records = []; saveStorage(); renderTable(); renderChart(); renderDow();
  ['s-revenue','s-adspend','s-roas','s-cpa','s-aov','s-selfrate'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '—'; el.style.color = '';
  });
  ['d-revenue','d-adspend','d-roas','d-cpa','d-aov','d-selfrate'].forEach(id =>
    document.getElementById(id).innerHTML = '');
}

function getFilteredRecords() {
  const from = document.getElementById('filter-from').value;
  const to   = document.getElementById('filter-to').value;
  return records.filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    return true;
  });
}

function resetFilter() {
  document.getElementById('filter-from').value = '';
  document.getElementById('filter-to').value   = '';
  renderTable(); renderChart();
}

function setTableTimeFilter(btn) {
  tableTimeFilter = btn.dataset.tf;
  document.querySelectorAll('.time-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function switchDowMetric(metric, btn) {
  dowMetric = metric;
  document.querySelectorAll('#dow-metric-tabs .metric-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDow();
}

function setDowPeriod(btn) {
  dowPeriod = btn.dataset.period;
  document.querySelectorAll('.dow-period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDow();
}

function getDowRecords() {
  const base = records.filter(r => r.time === '0');
  if (dowPeriod === 'all') return base;
  const days = { '1w': 7, '2w': 14, '3w': 21, '1m': 30 }[dowPeriod];
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  return base.filter(r => r.date >= cutoffStr);
}

function switchTab(name, btn) {
  document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'dow') renderDow();
}

function renderTable() {
  const tbody   = document.getElementById('records-tbody');
  const emptyEl = document.getElementById('empty-state');
  const base    = getFilteredRecords();
  const data    = tableTimeFilter === 'all' ? base : base.filter(r => r.time === tableTimeFilter);
  if (data.length === 0) { tbody.innerHTML = ''; emptyEl.style.display = 'block'; return; }
  emptyEl.style.display = 'none';

  tbody.innerHTML = [...data].reverse().map(r => {
    const m = calcMetrics(r);
    const roasColor = m.roas >= 300 ? 'var(--green)' : m.roas >= 150 ? 'var(--yellow)' : 'var(--red)';
    const timeLabel = r.time === '0' ? '최종' : r.time + '시';
    const timeBadge = r.time === '0' ? 'final' : r.time;
    return `<tr>
      <td class="center">${r.date}</td>
      <td class="center"><span class="badge-time badge-${timeBadge}">${timeLabel}</span></td>
      <td>${fmtWon(m.revenue)}</td>
      <td>${fmtWon(m.cafe24Net)}</td>
      <td>${fmtWon(m.coupangNet)}</td>
      <td>${fmtWon(m.adspend)}</td>
      <td>${fmtWon(r.meta)}</td>
      <td>${fmtWon(r.google)}</td>
      <td>${fmtWon(r.tiktok)}</td>
      <td>${m.orders.toLocaleString()}건</td>
      <td style="color:${roasColor}; font-weight:700">${m.roas.toFixed(0)}%</td>
      <td>${fmtWon(m.cpa)}</td>
      <td>${fmtWon(m.aov)}</td>
      <td>${m.selfRate.toFixed(1)}%</td>
      <td class="memo-cell" title="${r.memo || ''}">${r.memo || ''}</td>
      <td><button class="del-btn" onclick="deleteRecord(${r.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function switchMetric(metric, btn) {
  currentMetric = metric;
  document.querySelectorAll('.metric-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderChart() {
  if (chart) { chart.destroy(); chart = null; }

  // 직전 7일 고정
  const todayD = new Date(); todayD.setHours(0,0,0,0);
  const baseD  = new Date(todayD); baseD.setDate(baseD.getDate() - 6);
  const baseDateStr = `${baseD.getFullYear()}-${String(baseD.getMonth()+1).padStart(2,'0')}-${String(baseD.getDate()).padStart(2,'0')}`;
  const data = records.filter(r => r.date >= baseDateStr);

  // x값: 날짜 오프셋(0~6) + 시간 비율
  function toX(r) {
    const d = new Date(r.date); d.setHours(0,0,0,0);
    const dayOff = Math.round((d - baseD) / 86400000);
    const frac = r.time === '12' ? 0.50 : r.time === '16' ? 0.667 : 0.99;
    return dayOff + frac;
  }

  // 7일 tick 라벨
  const tickDates = Array.from({length: 7}, (_, i) => {
    const d = new Date(baseD); d.setDate(d.getDate() + i);
    return { value: i, label: `${d.getMonth()+1}/${d.getDate()}` };
  });

  const metricCfg = {
    roas:    { label: 'ROAS (%)', color: '#4f7fff', fn: r => calcMetrics(r).roas },
    revenue: { label: '총매출',   color: '#22c55e', fn: r => calcMetrics(r).revenue },
    adspend: { label: '광고비',   color: '#f59e0b', fn: r => calcMetrics(r).adspend },
    cpa:     { label: 'CPA',      color: '#ef4444', fn: r => calcMetrics(r).cpa },
    aov:     { label: '객단가',   color: '#a78bfa', fn: r => calcMetrics(r).aov },
  };
  const cfg = metricCfg[currentMetric];

  const allPts   = data.map(r => ({ x: toX(r), y: cfg.fn(r), r }));
  const finalPts = data.map(r => ({ x: toX(r), y: r.time === '0' ? cfg.fn(r) : null, r }));
  const ptColors = data.map(r => r.time === '0' ? cfg.color : 'rgba(255,255,255,0.35)');
  const ptSizes  = data.map(r => r.time === '0' ? 7 : 4);

  const ctx = document.getElementById('trend-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: '실시간',
          data: allPts,
          borderColor: 'rgba(255,255,255,0.2)',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5, 5],
          pointBackgroundColor: ptColors,
          pointBorderColor: '#1a1d27',
          pointBorderWidth: 1.5,
          pointRadius: ptSizes,
          pointHoverRadius: 8,
          fill: false,
          tension: 0.3,
          order: 2,
        },
        {
          label: cfg.label + ' (최종)',
          data: finalPts,
          borderColor: cfg.color,
          backgroundColor: cfg.color + '18',
          borderWidth: 2.5,
          pointBackgroundColor: cfg.color,
          pointBorderColor: '#1a1d27',
          pointBorderWidth: 2,
          pointRadius: 7,
          pointHoverRadius: 9,
          fill: true,
          tension: 0.3,
          spanGaps: true,
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { intersect: false, mode: 'nearest', axis: 'x' },
      plugins: {
        legend: { labels: { color: '#8892a4', font: { family: 'Pretendard', size: 12 } } },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2e3348', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#8892a4', padding: 10,
          filter: item => item.parsed.y !== null,
          callbacks: {
            title: items => {
              if (!items.length) return '';
              const r = items[0].raw?.r;
              if (!r) return '';
              const p = r.date.split('-');
              const t = r.time === '0' ? '최종' : r.time + '시';
              return `${p[1]}/${p[2]} ${t}`;
            },
            label: ctx => {
              if (ctx.parsed.y === null) return null;
              const v = ctx.parsed.y;
              const r = ctx.raw?.r;
              const memo = r?.memo ? `  📝 ${r.memo}` : '';
              if (currentMetric === 'roas') return [`  ${ctx.dataset.label}: ${v.toFixed(0)}%`, memo].filter(Boolean);
              return [`  ${ctx.dataset.label}: ${Math.round(v).toLocaleString()}원`, memo].filter(Boolean);
            }
          }
        }
      },
      scales: {
        x: {
          type: 'linear',
          min: -0.05,
          max: 6.99,
          afterBuildTicks: scale => {
            scale.ticks = tickDates.map(t => ({ value: t.value }));
          },
          ticks: {
            color: '#8892a4',
            font: { family: 'Pretendard', size: 11 },
            callback: val => {
              const t = tickDates.find(t => Math.abs(t.value - val) < 0.01);
              return t ? t.label : '';
            }
          },
          grid: { color: 'rgba(46,51,72,0.6)' }
        },
        y: {
          grid: { color: 'rgba(46,51,72,0.6)' },
          ticks: {
            color: '#8892a4', font: { family: 'Pretendard', size: 11 },
            callback: v => {
              if (currentMetric === 'roas') return v.toFixed(0) + '%';
              if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(1) + '억';
              if (Math.abs(v) >= 10000000)  return Math.round(v/10000) + '만';
              if (Math.abs(v) >= 1000000)   return (v/10000).toFixed(0) + '만';
              if (Math.abs(v) >= 10000)     return (v/10000).toFixed(1) + '만';
              return Math.round(v).toLocaleString();
            }
          }
        }
      }
    }
  });
}

// 요일별 평균
function renderDow() {
  const DOW_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
  const buckets   = Array.from({ length: 7 }, () => ({ revenue: 0, adspend: 0, roas: 0, cpa: 0, aov: 0, count: 0 }));

  getDowRecords().forEach(r => {
    const dow = new Date(r.date).getDay();
    const m   = calcMetrics(r);
    buckets[dow].revenue  += m.revenue;
    buckets[dow].adspend  += m.adspend;
    buckets[dow].roas     += m.roas;
    buckets[dow].cpa      += m.cpa;
    buckets[dow].aov      += m.aov;
    buckets[dow].count    += 1;
  });

  const hasData = buckets.some(b => b.count > 0);
  document.getElementById('dow-empty').style.display = hasData ? 'none' : 'block';

  const mc = {
    roas:    { label: 'ROAS',  fmtV: v => v.toFixed(0) + '%',  color: v => v >= 300 ? 'var(--green)' : v >= 150 ? 'var(--yellow)' : 'var(--red)', chartColor: null },
    revenue: { label: '매출',  fmtV: v => fmt(v) + '원',       color: _ => 'var(--green)',  chartColor: '#22c55e' },
    adspend: { label: '광고비', fmtV: v => fmt(v) + '원',      color: _ => 'var(--yellow)', chartColor: '#f59e0b' },
    cpa:     { label: 'CPA',   fmtV: v => fmt(v) + '원',       color: _ => 'var(--red)',    chartColor: '#ef4444' },
    aov:     { label: '객단가', fmtV: v => fmt(v) + '원',      color: _ => 'var(--purple)', chartColor: '#a78bfa' },
  }[dowMetric];

  const grid = document.getElementById('dow-grid');
  grid.innerHTML = DOW_NAMES.map((name, i) => {
    const b = buckets[i];
    if (b.count === 0) return `<div class="dow-card">
      <div class="dow-name">${name}요일</div>
      <div class="dow-roas" style="color:var(--muted)">—</div>
      <div class="dow-count">기록 없음</div>
    </div>`;
    const avg = b[dowMetric] / b.count;
    const subLines = [
      dowMetric !== 'revenue' ? `매출 ${fmt(b.revenue/b.count)}원` : '',
      dowMetric !== 'adspend' ? `광고비 ${fmt(b.adspend/b.count)}원` : '',
      dowMetric !== 'aov'     ? `객단가 ${fmt(b.aov/b.count)}원` : '',
    ].filter(Boolean).join('<br>');
    return `<div class="dow-card">
      <div class="dow-name">${name}요일</div>
      <div class="dow-roas" style="color:${mc.color(avg)}">${mc.fmtV(avg)}</div>
      <div class="dow-sub">${subLines}</div>
      <div class="dow-count">${b.count}건 평균</div>
    </div>`;
  }).join('');

  if (dowChart) { dowChart.destroy(); dowChart = null; }
  if (!hasData) return;

  const avgValues = buckets.map(b => b.count > 0 ? b[dowMetric] / b.count : null);
  const colors = dowMetric === 'roas'
    ? avgValues.map(v => v == null ? '#2e3348' : v >= 300 ? '#22c55e' : v >= 150 ? '#f59e0b' : '#ef4444')
    : avgValues.map(v => v == null ? '#2e3348' : mc.chartColor);

  const ctx2 = document.getElementById('dow-chart').getContext('2d');
  dowChart = new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: DOW_NAMES.map(n => n + '요일'),
      datasets: [{
        label: `평균 ${mc.label}`,
        data: avgValues,
        backgroundColor: colors.map(c => c + 'aa'),
        borderColor: colors,
        borderWidth: 1.5,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#8892a4', font: { family: 'Pretendard', size: 12 } } },
        tooltip: {
          backgroundColor: '#1a1d27', borderColor: '#2e3348', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#8892a4',
          callbacks: { label: ctx => `  평균 ${mc.label}: ${mc.fmtV(ctx.parsed.y)}` }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(46,51,72,0.6)' }, ticks: { color: '#8892a4', font: { family: 'Pretendard' } } },
        y: { grid: { color: 'rgba(46,51,72,0.6)' }, ticks: { color: '#8892a4', font: { family: 'Pretendard' },
          callback: v => dowMetric === 'roas' ? v.toFixed(0) + '%' : Math.round(v/10000) + '만' } }
      }
    }
  });
}

function captureReport() {
  html2canvas(document.querySelector('.main'), { backgroundColor: '#0f1117', scale: 2 }).then(canvas => {
    const a = document.createElement('a');
    a.download = `해트케_리포트_${today()}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

function copyToSheet() {
  if (records.length === 0) { alert('저장된 데이터가 없습니다.'); return; }

  const DOW = ['일', '월', '화', '수', '목', '금', '토'];
  const n = v => Math.round(v).toLocaleString();

  const r  = records[records.length - 1];
  const m  = calcMetrics(r);
  const d  = new Date(r.date);
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const dow = DOW[d.getDay()];
  const timeLabel = r.time === '0' ? '최종' : `${r.time}:00`;
  const dateStr = `${yy}/${mm}/${dd} (${dow}) ${timeLabel}`;

  const selfPct  = Math.round(m.selfRate);
  const otherPct = 100 - selfPct;
  const memo = r.memo ? `\n📝 ${r.memo}` : '';

  const text = [
    dateStr,
    '',
    `•    광고비 ${n(m.adspend)}`,
    `\t◦    틱톡 ${n(r.tiktok)}`,
    `\t◦    구글 ${n(r.google)}`,
    `\t◦    메타 ${n(r.meta)}`,
    '',
    `•    매출 ${n(m.revenue)} / ${m.orders}`,
    `\t◦    자사몰 ${n(m.cafe24Net)} / ${r.cafe24Orders}`,
    `\t◦    쿠팡 ${n(m.coupangNet)} / ${(r.coupangOrders || 0) + (r.coupang2Orders || 0)}`,
    '',
    `•    ROAS ${m.roas.toFixed(0)}% / CPA ${n(m.cpa)}`,
    `•    객단가 ${n(m.aov)}`,
    `•    결제 비율 (자사몰 ${selfPct}% / 외 ${otherPct}%)`,
    memo,
  ].filter(line => line !== '').join('\n');

  navigator.clipboard.writeText(text)
    .then(() => alert(`${dateStr} 데이터가 복사되었습니다.`))
    .catch(() => alert('복사 실패. 브라우저 권한을 확인해주세요.'));
}

// 초기화
renderTable();
renderChart();
if (records.length > 0) updateSummary(records[records.length - 1]);
</script>
</body>
