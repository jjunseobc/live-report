<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해트케 실시간 리포트</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3348;
  --text: #e2e8f0; --muted: #8892a4; --accent: #4f7fff;
  --red: #ef4444; --yellow: #f59e0b; --green: #22c55e;
}
body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; min-height: 100vh; }

.header { display: flex; align-items: center; gap: 12px; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); }
.logo { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; }
.header h1 { font-size: 15px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-time { margin-left: auto; font-size: 12px; color: var(--muted); }

.main { max-width: 1500px; margin: 0 auto; padding: 24px 28px; }
.section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

/* Input card */
.input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; }
.input-block { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 16px; }
.input-block:last-child { margin-bottom: 0; }
.block-label { font-size: 12px; font-weight: 700; color: var(--text); padding-bottom: 2px; min-width: 50px; align-self: flex-end; }
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-group label { font-size: 11px; color: var(--muted); }
.input-group input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 8px 12px; border-radius: 8px; outline: none; width: 150px; }
.input-group input:focus { border-color: var(--accent); }
.input-group input[type=date] { width: 160px; color-scheme: dark; }

.time-btns { display: flex; gap: 8px; }
.time-btn { padding: 8px 22px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; }
.time-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.vdiv { width: 1px; height: 44px; background: var(--border); align-self: flex-end; margin: 0 4px; }

/* Action row */
.action-row { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 24px; }
.btn { padding: 9px 20px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3d6ef0; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--border); }
.btn-danger { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
.btn-danger:hover { background: rgba(239,68,68,0.22); }

/* Summary */
.summary-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 24px; }
.s-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.s-lbl { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
.s-val { font-size: 20px; font-weight: 700; }

/* Graph */
.graph-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; }
.graph-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.graph-title { font-size: 13px; font-weight: 600; }
.metric-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.metric-tab { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
.metric-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Table */
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.table-title { font-size: 13px; font-weight: 600; }
.filter-row { display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--muted); }
.filter-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 5px 10px; border-radius: 6px; outline: none; color-scheme: dark; }
.filter-input:focus { border-color: var(--accent); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--surface2); color: var(--muted); font-weight: 600; padding: 10px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5; }
th:first-child, th:nth-child(2) { text-align: center; }
td { padding: 9px 12px; border-bottom: 1px solid rgba(46,51,72,0.4); text-align: right; white-space: nowrap; }
td:first-child, td:nth-child(2) { text-align: center; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

.badge-time { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
.badge-12 { background: rgba(79,127,255,0.15); color: #6b9fff; }
.badge-16 { background: rgba(245,158,11,0.15); color: var(--yellow); }

.del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; }
.del-btn:hover { color: var(--red); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">H</div>
  <h1>해트케 <span>실시간 리포트</span></h1>
  <span class="header-time" id="header-time"></span>
</div>

<div class="main">

  <div class="section-label">데이터 입력</div>
  <div class="input-card">

    <!-- Row 1: 날짜 + 시간 -->
    <div class="input-block">
      <div class="input-group">
        <label>날짜</label>
        <input type="date" id="inp-date">
      </div>
      <div class="input-group">
        <label>시간대</label>
        <div class="time-btns">
          <button class="time-btn active" data-t="12" onclick="selectTime(this)">12시</button>
          <button class="time-btn" data-t="16" onclick="selectTime(this)">16시</button>
        </div>
      </div>
    </div>

    <!-- Row 2: 매출 -->
    <div class="input-block">
      <span class="block-label">매출</span>
      <div class="input-group">
        <label>카페24 매출</label>
        <input type="number" id="inp-cafe24-sales" placeholder="0">
      </div>
      <div class="input-group">
        <label>카페24 주문건수</label>
        <input type="number" id="inp-cafe24-orders" placeholder="0">
      </div>
      <div class="input-group">
        <label>카페24 환불</label>
        <input type="number" id="inp-cafe24-refund" placeholder="0">
      </div>
      <div class="vdiv"></div>
      <div class="input-group">
        <label>쿠팡 매출</label>
        <input type="number" id="inp-coupang-sales" placeholder="0">
      </div>
      <div class="input-group">
        <label>쿠팡 주문건수</label>
        <input type="number" id="inp-coupang-orders" placeholder="0">
      </div>
      <div class="input-group">
        <label>쿠팡 환불</label>
        <input type="number" id="inp-coupang-refund" placeholder="0">
      </div>
    </div>

    <!-- Row 3: 광고비 -->
    <div class="input-block">
      <span class="block-label">광고비</span>
      <div class="input-group">
        <label>메타</label>
        <input type="number" id="inp-meta" placeholder="0">
      </div>
      <div class="input-group">
        <label>구글</label>
        <input type="number" id="inp-google" placeholder="0">
      </div>
      <div class="input-group">
        <label>틱톡</label>
        <input type="number" id="inp-tiktok" placeholder="0">
      </div>
    </div>

  </div>

  <div class="action-row">
    <button class="btn btn-ghost" onclick="captureReport()">캡처</button>
    <button class="btn btn-ghost" onclick="copyToSheet()">스프레드시트 복사</button>
    <button class="btn btn-primary" onclick="saveRecord()">저장</button>
  </div>

  <!-- Summary -->
  <div class="section-label">최근 저장 기준</div>
  <div class="summary-grid">
    <div class="s-card"><div class="s-lbl">총 매출</div><div class="s-val" id="s-revenue">—</div></div>
    <div class="s-card"><div class="s-lbl">총 광고비</div><div class="s-val" id="s-adspend">—</div></div>
    <div class="s-card"><div class="s-lbl">ROAS</div><div class="s-val" id="s-roas">—</div></div>
    <div class="s-card"><div class="s-lbl">CPA</div><div class="s-val" id="s-cpa">—</div></div>
    <div class="s-card"><div class="s-lbl">객단가</div><div class="s-val" id="s-aov">—</div></div>
    <div class="s-card"><div class="s-lbl">자사 비율</div><div class="s-val" id="s-selfrate">—</div></div>
  </div>

  <!-- Graph -->
  <div class="graph-card">
    <div class="graph-header">
      <span class="graph-title">트렌드 그래프</span>
      <div class="metric-tabs">
        <button class="metric-tab active" onclick="switchMetric('roas', this)">ROAS</button>
        <button class="metric-tab" onclick="switchMetric('revenue', this)">매출</button>
        <button class="metric-tab" onclick="switchMetric('adspend', this)">광고비</button>
        <button class="metric-tab" onclick="switchMetric('cpa', this)">CPA</button>
        <button class="metric-tab" onclick="switchMetric('aov', this)">객단가</button>
      </div>
    </div>
    <canvas id="trend-chart" height="75"></canvas>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">리포트 기록</span>
      <button class="btn btn-danger" onclick="clearAll()">전체 초기화</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">기간 필터</span>
      <input type="date" class="filter-input" id="filter-from" onchange="renderTable(); renderChart();">
      <span style="font-size:11px; color:var(--muted)">~</span>
      <input type="date" class="filter-input" id="filter-to" onchange="renderTable(); renderChart();">
      <button class="btn btn-ghost" style="padding:5px 14px; font-size:11px;" onclick="resetFilter()">초기화</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>시간</th>
            <th>총 매출</th>
            <th>카페24</th>
            <th>쿠팡</th>
            <th>총 광고비</th>
            <th>메타</th>
            <th>구글</th>
            <th>틱톡</th>
            <th>주문건수</th>
            <th>ROAS</th>
            <th>CPA</th>
            <th>객단가</th>
            <th>자사율</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="records-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state">저장된 리포트가 없습니다.</div>
    </div>
  </div>

</div>

<script>
const STORE_KEY = 'hatke_realtime_v1';
let records = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
let currentMetric = 'roas';
let chart = null;

// 헤더 시계
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('header-time').textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
updateClock();
setInterval(updateClock, 1000);

// 오늘 날짜 기본값
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
document.getElementById('inp-date').value = today();

function selectTime(btn) {
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getSelectedTime() {
  return document.querySelector('.time-btn.active')?.dataset.t || '12';
}

function num(id) {
  return parseFloat(document.getElementById(id).value) || 0;
}

function fmt(n) {
  if (Math.abs(n) >= 100000000) return (n / 100000000).toFixed(1) + '억';
  if (Math.abs(n) >= 10000) return Math.round(n / 10000) + '만';
  return Math.round(n).toLocaleString();
}

function fmtWon(n) {
  return Math.round(n).toLocaleString() + '원';
}

function calcMetrics(r) {
  const cafe24Net = (r.cafe24Sales || 0) - (r.cafe24Refund || 0);
  const coupangNet = (r.coupangSales || 0) - (r.coupangRefund || 0);
  const revenue = cafe24Net + coupangNet;
  const adspend = (r.meta || 0) + (r.google || 0) + (r.tiktok || 0);
  const orders = (r.cafe24Orders || 0) + (r.coupangOrders || 0);
  const roas = adspend > 0 ? revenue / adspend * 100 : 0;
  const cpa = orders > 0 ? adspend / orders : 0;
  const aov = orders > 0 ? revenue / orders : 0;
  const selfRate = revenue > 0 ? cafe24Net / revenue * 100 : 0;
  return { revenue, adspend, orders, roas, cpa, aov, selfRate, cafe24Net, coupangNet };
}

function saveRecord() {
  const date = document.getElementById('inp-date').value;
  const time = getSelectedTime();
  if (!date) { alert('날짜를 선택해주세요.'); return; }

  const rec = {
    id: Date.now(),
    date,
    time,
    cafe24Sales:   num('inp-cafe24-sales'),
    cafe24Orders:  num('inp-cafe24-orders'),
    cafe24Refund:  num('inp-cafe24-refund'),
    coupangSales:  num('inp-coupang-sales'),
    coupangOrders: num('inp-coupang-orders'),
    coupangRefund: num('inp-coupang-refund'),
    meta:   num('inp-meta'),
    google: num('inp-google'),
    tiktok: num('inp-tiktok'),
  };

  const idx = records.findIndex(r => r.date === date && r.time === time);
  if (idx >= 0) {
    if (!confirm(`${date} ${time}시 기록이 이미 있습니다. 덮어쓸까요?`)) return;
    records[idx] = rec;
  } else {
    records.push(rec);
  }

  records.sort((a, b) => (a.date + a.time) < (b.date + b.time) ? -1 : 1);
  saveStorage();
  updateSummary(rec);
  clearInputs();
  renderTable();
  renderChart();
}

function clearInputs() {
  ['inp-cafe24-sales','inp-cafe24-orders','inp-cafe24-refund',
   'inp-coupang-sales','inp-coupang-orders','inp-coupang-refund',
   'inp-meta','inp-google','inp-tiktok'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function saveStorage() {
  localStorage.setItem(STORE_KEY, JSON.stringify(records));
}

function updateSummary(rec) {
  const m = calcMetrics(rec);
  document.getElementById('s-revenue').textContent  = fmt(m.revenue) + '원';
  document.getElementById('s-adspend').textContent  = fmt(m.adspend) + '원';
  document.getElementById('s-roas').textContent     = m.roas.toFixed(0) + '%';
  document.getElementById('s-cpa').textContent      = fmt(m.cpa) + '원';
  document.getElementById('s-aov').textContent      = fmt(m.aov) + '원';
  document.getElementById('s-selfrate').textContent = m.selfRate.toFixed(1) + '%';

  const roasEl = document.getElementById('s-roas');
  roasEl.style.color = m.roas >= 300 ? 'var(--green)' : m.roas >= 150 ? 'var(--yellow)' : 'var(--red)';
}

function deleteRecord(id) {
  if (!confirm('이 기록을 삭제하시겠습니까?')) return;
  records = records.filter(r => r.id !== id);
  saveStorage();
  renderTable();
  renderChart();
}

function clearAll() {
  if (!confirm('모든 기록을 삭제하시겠습니까?')) return;
  records = [];
  saveStorage();
  renderTable();
  renderChart();
  ['s-revenue','s-adspend','s-roas','s-cpa','s-aov','s-selfrate'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '—';
    el.style.color = '';
  });
}

function getFilteredRecords() {
  const from = document.getElementById('filter-from').value;
  const to   = document.getElementById('filter-to').value;
  return records.filter(r => {
    if (from && r.date < from) return false;
    if (to   && r.date > to)   return false;
    return true;
  });
}

function resetFilter() {
  document.getElementById('filter-from').value = '';
  document.getElementById('filter-to').value   = '';
  renderTable();
  renderChart();
}

function renderTable() {
  const tbody  = document.getElementById('records-tbody');
  const emptyEl = document.getElementById('empty-state');
  const data   = getFilteredRecords();

  if (data.length === 0) {
    tbody.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  tbody.innerHTML = [...data].reverse().map(r => {
    const m = calcMetrics(r);
    const roasColor = m.roas >= 300 ? 'var(--green)' : m.roas >= 150 ? 'var(--yellow)' : 'var(--red)';
    return `<tr>
      <td>${r.date}</td>
      <td><span class="badge-time badge-${r.time}">${r.time}시</span></td>
      <td>${fmtWon(m.revenue)}</td>
      <td>${fmtWon(m.cafe24Net)}</td>
      <td>${fmtWon(m.coupangNet)}</td>
      <td>${fmtWon(m.adspend)}</td>
      <td>${fmtWon(r.meta)}</td>
      <td>${fmtWon(r.google)}</td>
      <td>${fmtWon(r.tiktok)}</td>
      <td>${m.orders.toLocaleString()}건</td>
      <td style="color:${roasColor}; font-weight:700">${m.roas.toFixed(0)}%</td>
      <td>${fmtWon(m.cpa)}</td>
      <td>${fmtWon(m.aov)}</td>
      <td>${m.selfRate.toFixed(1)}%</td>
      <td><button class="del-btn" onclick="deleteRecord(${r.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function switchMetric(metric, btn) {
  currentMetric = metric;
  document.querySelectorAll('.metric-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function renderChart() {
  const data = getFilteredRecords();

  const labels = data.map(r => {
    const parts = r.date.split('-');
    return `${parts[1]}/${parts[2]} ${r.time}시`;
  });

  const metricCfg = {
    roas:    { label: 'ROAS (%)',  color: '#4f7fff', fn: r => calcMetrics(r).roas },
    revenue: { label: '총매출',    color: '#22c55e', fn: r => calcMetrics(r).revenue },
    adspend: { label: '광고비',    color: '#f59e0b', fn: r => calcMetrics(r).adspend },
    cpa:     { label: 'CPA',       color: '#ef4444', fn: r => calcMetrics(r).cpa },
    aov:     { label: '객단가',    color: '#a78bfa', fn: r => calcMetrics(r).aov },
  };

  const cfg = metricCfg[currentMetric];
  const values = data.map(cfg.fn);

  if (chart) { chart.destroy(); chart = null; }

  if (data.length === 0) return;

  const ctx = document.getElementById('trend-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: cfg.label,
        data: values,
        borderColor: cfg.color,
        backgroundColor: cfg.color + '18',
        borderWidth: 2.5,
        pointBackgroundColor: cfg.color,
        pointBorderColor: '#1a1d27',
        pointBorderWidth: 2,
        pointRadius: 6,
        pointHoverRadius: 8,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: {
          labels: { color: '#8892a4', font: { family: 'Pretendard', size: 12 } }
        },
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2e3348',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#8892a4',
          padding: 10,
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (currentMetric === 'roas') return `  ROAS: ${v.toFixed(0)}%`;
              return `  ${cfg.label}: ${Math.round(v).toLocaleString()}원`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(46,51,72,0.6)' },
          ticks: { color: '#8892a4', font: { family: 'Pretendard', size: 11 }, maxRotation: 45 }
        },
        y: {
          grid: { color: 'rgba(46,51,72,0.6)' },
          ticks: {
            color: '#8892a4',
            font: { family: 'Pretendard', size: 11 },
            callback: v => currentMetric === 'roas' ? v.toFixed(0) + '%' : Math.round(v / 10000) + '만'
          }
        }
      }
    }
  });
}

function captureReport() {
  html2canvas(document.querySelector('.main'), { backgroundColor: '#0f1117', scale: 2 }).then(canvas => {
    const a = document.createElement('a');
    const d = new Date();
    a.download = `해트케_리포트_${today()}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

function copyToSheet() {
  const data = getFilteredRecords();
  if (data.length === 0) { alert('복사할 데이터가 없습니다.'); return; }

  const header = ['날짜','시간','총매출','카페24','쿠팡','총광고비','메타','구글','틱톡','주문건수','ROAS(%)','CPA','객단가','자사율(%)'];
  const rows = data.map(r => {
    const m = calcMetrics(r);
    return [
      r.date, r.time + '시',
      Math.round(m.revenue), Math.round(m.cafe24Net), Math.round(m.coupangNet),
      Math.round(m.adspend), Math.round(r.meta), Math.round(r.google), Math.round(r.tiktok),
      m.orders, m.roas.toFixed(1), Math.round(m.cpa), Math.round(m.aov), m.selfRate.toFixed(1)
    ];
  });

  const text = [header, ...rows].map(row => row.join('\t')).join('\n');
  navigator.clipboard.writeText(text)
    .then(() => alert('클립보드에 복사되었습니다.\n스프레드시트에 붙여넣기 하세요.'))
    .catch(() => alert('복사에 실패했습니다. 브라우저 권한을 확인해주세요.'));
}

// 초기 렌더
renderTable();
renderChart();
if (records.length > 0) updateSummary(records[records.length - 1]);
</script>
